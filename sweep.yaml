program: src/train.py

command:
  - python3
  - ${program}
  - ${args}

method: random

metric:
  name: loss
  goal: minimize

parameters:

  dataset:
    values: ["mnist"]

  learning_rate:
    values: [0.0001, 0.001, 0.01]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop", "adam", "nadam"]

  activation:
    values: ["relu", "sigmoid", "tanh"]

  hidden_layers:
    values: [1, 2, 3]

  num_neurons:
    values: [64, 128]

  batch_size:
    values: [32, 64]

  weight_init:
    values: ["random", "xavier"]